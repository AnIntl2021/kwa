<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - 5th Kuwaiti-Arab Youth Forum 2026</title>
    <style>
        /* Base Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9fafb;
            color: #374151;
            margin: 0;
            padding: 0;
        }

        /* Container */
        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Header */
        .header {
            text-align: center;
            background-color: #ffffff;
            padding: 20px 0;
            border-bottom: 2px solid #06b6d4; /* cyan-500 */
        }

        .header h1 {
            color: #06b6d4;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header p {
            font-style: italic;
            color: #6b7280;
            margin-top: 5px;
        }

        /* Form Card */
        .form-card {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            margin-top: 20px;
        }

        .form-banner {
            background-color: #06b6d4;
            color: #ffffff;
            padding: 20px;
        }

        .form-banner h2 {
            margin: 0;
            font-size: 1.25rem;
        }

        .form-body {
            padding: 30px;
        }

        /* Form Controls */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: #4b5563;
        }

        input[type="text"],
        input[type="email"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box; /* Ensures padding doesn't affect width */
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* Responsive Grid */
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        /* Button */
        .submit-btn {
            width: 100%;
            background-color: #06b6d4;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #0891b2;
        }

        .footer-note {
            font-size: 0.75rem;
            color: #9ca3af;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Youth Forum 2026</h1>
        <p>"Youth Innovate... Sustainable Water" [cite: 10, 86]</p>
    </div>

    <div class="container">
        <form class="form-card">
            <div class="form-banner">
                <h2>Registration Form</h2>
                <p style="margin: 5px 0 0; font-size: 0.9rem; color: #cffafe;">Join the 5th Kuwaiti-Arab Youth Forum </p>
            </div>

            <div class="form-body">
                <div class="grid">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" placeholder="As per Civil ID/Passport" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="example@mail.com" required>
                    </div>
                </div>

                <div class="grid">
                    <div class="form-group">
                        <label for="nationality">Nationality</label>
                        <input type="text" id="nationality" name="nationality" placeholder="e.g. Kuwaiti" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Category [cite: 125]</label>
                        <select id="category" name="category" required>
                            <option value="">Select your profile</option>
                            <option value="student">University Student / Graduate [cite: 126]</option>
                            <option value="professional">Sustainable Project Worker [cite: 127]</option>
                            <option value="innovator">Innovation/Initiative Owner [cite: 128]</option>
                            <option value="ngo">Civil Society Representative [cite: 129]</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="project">Project/Innovation Title (Optional)</label>
                    <input type="text" id="project" name="project" placeholder="Title of your water solution [cite: 94]">
                </div>

                <div class="form-group">
                    <label for="bio">Briefly describe your interest in Water Security & AI [cite: 114]</label>
                    <textarea id="bio" name="bio" rows="4" placeholder="How do you plan to use technology for sustainability?"></textarea>
                </div>

                <button type="submit" class="submit-btn">REGISTER FOR THE FORUM</button>
                
                <p class="footer-note">
                    Organized by the Kuwait Water Association[cite: 24, 87]. Participation is subject to local laws and visa regulations[cite: 134].
                </p>
            </div>
        </form>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تواصل معنا</title>

<style>
* {
  box-sizing: border-box;
  font-family: "Segoe UI", Tahoma, sans-serif;
}

body {
  margin: 0;
  /* Changed height to min-height to allow scrolling */
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  background: #202435;
  /* Added padding for mobile breathing room */
  padding: 40px 20px;
}

/* Background image */
body::before {
  content: "";
  position: fixed; /* Fixed so it stays behind while scrolling */
  inset: 0;
  background: url("https://customer-assets.emergentagent.com/job_b4947f91-cc89-422e-b6c2-759af70d53ff/artifacts/xapw5hpf_%D8%A7%D8%A8%D8%B1%D8%A7%D8%AC%20%D8%A7%D9%84%D9%83%D9%88%D9%8A%D8%AA.png")
    center/cover no-repeat;
  opacity: 0.10;
  z-index: 0;
}

/* Floating shapes - hidden on small mobile to reduce clutter */
.shape {
  position: absolute;
  width: 120px;
  height: 120px;
  border-radius: 20px;
  background: rgba(255, 245, 245, 0.12);
  backdrop-filter: blur(22px);
  border: 1px solid rgba(255,255,255,.35);
  animation: float 14s infinite ease-in-out;
  z-index: 1;
}

@media (max-width: 768px) {
  .shape { display: none; } /* Better UX for mobile */
}

.shape.s1{top:12%;left:16%;}
.shape.s2{top:20%;right:10%;width:90px;height:90px;animation-duration:11s;}
.shape.s3{bottom:14%;left:10%;width:100px;height:100px;animation-duration:16s;}
.shape.s4{bottom:10%;right:14%;width:150px;height:150px;animation-duration:18s;}

@keyframes float{
  0%{transform:translateY(0) rotate(0deg)}
  50%{transform:translateY(-30px) rotate(6deg)}
  100%{transform:translateY(0) rotate(0deg)}
}

/* Main glass card */
.card {
  position: relative;
  width: 100%;
  max-width: 480px; /* Slightly wider for better readability */
  padding: 36px;
  border-radius: 28px;
  background: rgba(255,255,255,.18);
  backdrop-filter: blur(26px);
  -webkit-backdrop-filter: blur(26px); /* Safari support */
  border: 1px solid rgba(255,255,255,.45);
  box-shadow: 0 40px 90px rgba(0,0,0,.45);
  animation: fadeUp 1.2s ease;
  z-index: 2;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(35px)}
  to{opacity:1;transform:translateY(0)}
}

h1{ margin:0; text-align:center; color:#ffffff; font-size:28px; font-weight:700; }
p{ margin:12px 0 28px; text-align:center; font-size:14px; color:#e5e7eb; line-height: 1.5; }
label{ display:block; margin-bottom:6px; font-size:13px; color:#f8fafc; }

input, textarea {
  width: 100%;
  padding: 14px 16px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,.3);
  background: rgba(255,255,255,.1);
  color:#ffffff;
  margin-bottom:18px;
  transition:.3s;
  font-size: 16px; /* Prevents auto-zoom on iPhone */
}

input:focus, textarea:focus {
  outline:none;
  background:rgba(255,255,255,.2);
  border-color:#fff;
}

textarea { min-height:100px; resize:none; }

button {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 14px;
  background: #ffffff;
  color:#020617;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:.3s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

/* Tablet and Mobile Adjustments */
@media(max-width: 480px) {
  body { padding: 20px 15px; }
  .card { padding: 24px; border-radius: 20px; }
  h1 { font-size: 22px; }
  p { font-size: 13px; }
}
</style>
</head>
<body>

<div class="shape s1"></div>
<div class="shape s2"></div>
<div class="shape s3"></div>
<div class="shape s4"></div>

<div class="card">
  <h1>تواصل معنا</h1>
  <p>يرجى تعبئة النموذج أدناه وسنقوم بالرد عليك في أقرب وقت ممكن</p>

  <label>الاسم الأول</label>
  <input type="text" placeholder="مثال: محمد">

  <label>اسم العائلة</label>
  <input type="text" placeholder="مثال: العتيبي">

  <label>البريد الإلكتروني</label>
  <input type="email" placeholder="example@mail.com">

  <label>رقم الهاتف</label>
  <input type="tel" placeholder="+965 ...">

  <label>الرسالة</label>
  <textarea placeholder="اكتب رسالتك هنا..."></textarea>

  <button type="submit">إرسال الرسالة</button>
</div>

</body>
</html>
